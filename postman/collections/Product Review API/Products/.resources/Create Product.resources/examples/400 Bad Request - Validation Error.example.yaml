$kind: http-example
request:
  url: "{{baseUrl}}/products"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "description": "Missing name and price"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"error":"Validation failed","details":["name is required","price is required"]}'
order: 2000
