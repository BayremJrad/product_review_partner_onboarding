$kind: http-example
request:
  url: "{{baseUrl}}/products/prod_001/reviews"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "rating": 5,
        "title": "Great product!",
        "body": "Really happy with this purchase. Sound quality is excellent.",
        "userId": "usr_123"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"id":"rev_001","productId":"prod_001","userId":"usr_123","userName":"Jane Doe","rating":5,"title":"Great product!","body":"Really happy with this purchase. Sound quality is excellent.","createdAt":"2026-07-17T10:00:00Z"}'
order: 1000
