$kind: http-example
request:
  url: "{{baseUrl}}/users/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "jane@example.com",
        "password": "securepassword123"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"token":"{{supabase_service_role_api_key_07bt}}","user":{"id":"usr_123","name":"Jane Doe","email":"jane@example.com"}}'
order: 1000
