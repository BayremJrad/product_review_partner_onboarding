$kind: http-example
request:
  url: "{{baseUrl}}/users/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "jane@example.com",
        "password": "wrongpassword"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"error":"Invalid email or password"}'
order: 2000
