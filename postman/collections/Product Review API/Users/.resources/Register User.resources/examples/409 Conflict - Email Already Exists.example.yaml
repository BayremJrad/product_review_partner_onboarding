$kind: http-example
request:
  url: "{{baseUrl}}/users/register"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "Jane Doe",
        "email": "jane@example.com",
        "password": "securepassword123"
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: '{"error":"Email already in use"}'
order: 2000
